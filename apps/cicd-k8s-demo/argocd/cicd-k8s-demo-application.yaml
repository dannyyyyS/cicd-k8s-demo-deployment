apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-k8s-demo-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dannyyyyS/cicd-k8s-demo-deployment.git
    targetRevision: main
    path: apps/cicd-k8s-demo/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true